<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#74ebd5,#9face6);
        }

        .container{
            width:400px;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#444;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#4CAF50;
            box-shadow:0 0 8px rgba(76,175,80,0.3);
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#4CAF50;
            color:white;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#388E3C;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Add Product</h2>

        <form method="POST">

            <label>ID</label>
            <input type="number" name="id" required>

            <label>Name</label>
            <input type="text" name="name" required>

            <label>Price</label>
            <input type="number" name="price" required>

            <label>Quantity</label>
            <input type="number" name="quantity" required>

            <button type="submit">Add Product</button>

        </form>

    </div>

</body>

</html>
