<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal</title>

    <link rel="shortcut icon" href="{{ url_for('static', filename='material/icon.jpg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/css.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Fallback to your dynamic background image, layered over the deep dark cyberpunk canvas */
            background: linear-gradient(rgba(5, 2, 18, 0.85), rgba(5, 2, 18, 0.85)), url("/static/material/login_b.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            color: #ffffff;
            padding: 20px;
        }

        /* Ambient neon glow backdrops */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            filter: blur(130px);
            opacity: 0.18;
            z-index: 0;
        }
        body::before {
            background: #00f2fe;
            top: 15%;
            left: 15%;
        }
        body::after {
            background: #9b51e0;
            bottom: 15%;
            right: 15%;
        }

        #container {
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            width: 100%;
        }

        /* Main Glassmorphism Card Wrapper */
        .glass-card {
            background: rgba(10, 10, 25, 0.45);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.05), 0 0 40px rgba(155, 81, 224, 0.05);
            position: relative;
        }

        /* Sleek Gradient Border Trim */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 24px;
            padding: 1.5px;
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.4), rgba(155, 81, 224, 0.4));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Brand Headings */
        .logo-container {
            margin-bottom: 25px;
        }

        .logo-icon {
            font-size: 38px;
            background: linear-gradient(135deg, #00f2fe, #9b51e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            display: inline-block;
        }

        .brand-name {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #dcdcdc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-sub {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #8a88a0;
            font-weight: 500;
            margin-top: 2px;
        }

        .divider {
            height: 2px;
            width: 35px;
            background: linear-gradient(to right, #00f2fe, #9b51e0);
            margin: 15px auto 0 auto;
            border-radius: 2px;
        }

        /* Main Form container */
        form {
            background: rgba(5, 5, 15, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px 24px;
            margin-top: 15px;
            text-align: left;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            color: white;
            margin-top: 0;
            margin-bottom: 6px;
        }

        .welcome-subtitle {
            font-size: 13px;
            color: #8a88a0;
            text-align: center;
            margin-bottom: 25px;
        }

        /* Preserved your functional input structures */
        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        .input-box input {
            width: 100%;
            height: 48px;
            padding: 0 20px 0 45px; /* Moved padding left to clear space for the icons */
            font-size: 14px;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-box input:focus {
            border-color: rgba(0, 242, 254, 0.5);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
        }

        /* Swapped icons to absolute-left positioning to match the visual */
        .input-box i {
            position: absolute;
            left: 16px;
            right: auto;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            transition: color 0.3s;
            pointer-events: none;
        }

        .input-box input[type="text"] + i { color: #00f2fe; }
        .input-box input[type="password"] + i { color: #9b51e0; }

        /* Extra contextual UI tweaks matching the design */
        .form-utils {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #b0afc6;
            margin-bottom: 20px;
            padding: 0 2px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .remember-me input {
            margin-right: 6px;
            width: auto;
            height: auto;
            accent-color: #00f2fe;
        }
        .forgot-pass {
            color: #7055ff;
            text-decoration: none;
            transition: color 0.3s;
        }
        .forgot-pass:hover { color: #00f2fe; }

        /* Premium Form Button */
        button {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            height: 48px;
            margin: 10px 0 0 0;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 40%, #9b51e0 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.25);
            transition: all 0.3s ease;
        }

        button:hover {
            opacity: 0.95;
            box-shadow: 0 4px 20px rgba(155, 81, 224, 0.45);
            transform: translateY(-1px);
            background-color: transparent; /* Overriding previous absolute color fallback */
        }

        /* Central Portal Info Footer */
        .secure-tag {
            font-size: 12px;
            color: #6c6a85;
            margin-top: 25px;
            text-align: center;
        }

        /* Responsive Global Footer placement */
        footer {
            color: #55536a;
            text-align: center;
            font-size: 11px;
            margin-top: 30px;
            width: 100%;
            z-index: 1;
        }
    </style>
</head>
<body>

<div id="container">
    <div class="glass-card">
        
        <div class="logo-container">
            <div class="logo-icon"><i class="fa-solid fa-cubes"></i></div>
            <div class="brand-name">Store</div>
            <div class="brand-sub">Management System</div>
            <div class="divider"></div>
        </div>

        <form action="/login" method="POST">
            <h1>Welcome Back!</h1>
            <p class="welcome-subtitle">Login to access your admin dashboard</p>

            <div class="input-box">
                <input id="name" name="username" type="text" placeholder="Username" required>
                <i class="fa-solid fa-user"></i>
            </div>

            <div class="input-box">
                <input type="password" id="pass" name="password" placeholder="Password" required>
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="form-utils">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-pass">Forgot password?</a>
            </div>

            <button type="submit"><i class="fa-solid fa-rocket"></i> Login</button>
        </form>

        <div class="secure-tag">
            <i class="fa-solid fa-shield-halved"></i> Secure Admin Portal
        </div>
    </div>
</div>

<footer>
    &copy; 2026 All rights reserved. MD Farhan
</footer>

</body>
</html>
